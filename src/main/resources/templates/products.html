<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products | StoreSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/products.css}">
    <link rel="icon" type="image/png" th:href="@{/images/storesync.png}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="main">
    <button class="hamburger" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="dashboard-header">
        <div class="header-content">
            <h1 class="project-title">Products</h1>
            <p class="project-tagline">Manage your inventory items</p>
        </div>
        <a th:href="@{/products/add}" class="view-all-btn" style="padding: 12px 24px; font-size: 14px;">
            <i class="fas fa-plus"></i> Add New Product
        </a>
    </div>

    <div class="table-card">
        <div class="table-header">
            <form th:action="@{/products/search}" method="get" style="display: flex; gap: 10px; width: 100%; max-width: 400px;">
                <input type="text" name="keyword" placeholder="Search product..." required 
                       style="flex: 1; padding: 10px 15px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: inherit;">
                <button type="submit" class="view-all-btn"><i class="fas fa-search"></i></button>
            </form>
        </div>

        <div th:if="${success}" class="badge ok" style="margin-bottom: 20px; display: block; text-align: center; padding: 12px;">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product Details</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Total Value</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td>
                        <div class="product-cell">
                            <i class="fas fa-cube"></i>
                            <span th:text="${p.name}"></span>
                        </div>
                    </td>
                    <td>
                        <span th:text="${p.quantity}" class="badge" 
                              th:classappend="${p.quantity < 10} ? 'low' : 'ok'"></span>
                    </td>
                    <td th:text="'&#8377;' + ${p.price}"></td>
                    <td th:text="'&#8377;' + ${p.quantity * p.price}" style="font-weight: 600; color: var(--primary-color);"></td>
                    <td>
                        <a th:href="@{/products/delete/{id}(id=${p.id})}"
                           onclick="return confirm('Are you sure?');"
                           style="color: var(--danger); font-size: 18px;">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">
                        <i class="fas fa-folder-open" style="font-size: 48px; display: block; margin-bottom: 10px;"></i>
                        No products found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
}
</script>

</body>
</html>
